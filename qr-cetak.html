<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>QR Code - Mif Lawyer & Partners</title>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
            {"@type": "ListItem", "position": 1, "name": "Beranda", "item": "https://miflawandpatners.my.id/"},
            {"@type": "ListItem", "position": 2, "name": "QR Code", "item": "https://miflawandpatners.my.id/qr-cetak.html"}
        ]
    }
    </script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background: white;
        }
        .qr-container {
            text-align: center;
            padding: 40px;
            border: 2px solid #1a365d;
            border-radius: 15px;
            display: inline-block;
        }
        h1 {
            color: #1a365d;
            font-size: 24px;
            margin-bottom: 10px;
        }
        h2 {
            color: #c9a84c;
            font-size: 18px;
            margin-bottom: 30px;
            font-weight: normal;
        }
        #qrcode {
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
        }
        #qrcode img,
        #qrcode canvas {
            margin: 0 auto;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-top: 20px;
        }
        @media print {
            body { padding: 20px; }
            .qr-container { border: 2px solid #000; }
        }
    </style>
</head>
<body>
    <div class="qr-container">
        <h1>Mif Lawyer & Partners</h1>
        <h2>Pengacara Pengadilan Agama</h2>
        <div id="qrcode"></div>
        <p>Scan QR Code ini untuk mengakses website kami</p>
        <p><strong>miflawandpatners.my.id</strong></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
        new QRCode(document.getElementById('qrcode'), {
            text: 'https://miflawandpatners.my.id',
            width: 200,
            height: 200
        });
    </script>
</body>
</html>
